spring.application.name=tratrangphuc-service

# =============================================
# DATA SOURCE - MySQL (costume_rental)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/costume_rental?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=dotuannghia
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Server
# =============================================
server.port=8081
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# =============================================
# Jackson
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# Eureka Client
# =============================================
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
eureka.client.initial-instance-info-replication-interval-seconds=5

# =============================================
# Logging
# =============================================
logging.level.com.tratrangphuc=DEBUG
logging.level.com.tratrangphuc.client=DEBUG
