spring.application.name=loihongphat-service

# =============================================
# DATA SOURCE - MySQL (DB rieng: loihongphat_db)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/loihongphat_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=dotuannghia
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# SQL initialization (schema + data)
# =============================================
spring.sql.init.mode=never

# =============================================
# Server
# =============================================
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# =============================================
# Logging
# =============================================
logging.level.com.loihongphat=DEBUG

# =============================================
# Eureka Client
# =============================================
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
